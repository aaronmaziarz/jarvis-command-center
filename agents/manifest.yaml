# OpenClaw Agent Configuration Manifest
# Single source of truth for all registered agents
# 
# TO ADD/EDIT AN AGENT:
# 1. Edit this file (YAML format)
# 2. Run: python3 agents/generate-config.py
# 3. Restart OpenClaw gateway
#
# TO ADD A NEW AGENT:
# 1. Add entry below with unique id
# 2. Create agents/<id>/prompt.md for system prompt
# 3. Run generate-config.py
# 4. Restart gateway

# ==============================================================================
# TIER 1: EXECUTIVE / ORCHESTRATION
# ==============================================================================

brain:
  id: "brain"
  display_name: "Jarvis"
  role: "Executive Orchestrator"
  tier: 1
  description: |
    Top-level orchestrator, user-facing intelligence, routing authority.
    Supervises all work, decides direct answer vs delegation.
    Final synthesizer for responses.
  model: "openrouter/minimax/minimax-m2.5"  # Default, can override
  model_reasoning: "openrouter/deepseek/deepseek-r1"  # For complex reasoning
  workspace: "/home/node/.openclaw/workspace"
  prompt_file: "agents/brain/prompt.md"
  tools:
    - read
    - write
    - edit
    - exec
    - sessions_spawn
    - memory_search
    - memory_get
    - web_search
    - web_fetch
    - message
  channels:
    - telegram  # Main channel (auto-bound)
  default_verbosity: "normal"
  user_facing: true
  internal_only: false
  routing:
    can_delegate: true
    can_answer_directly: true
    auto_route_criteria:
      - type: "task_complexity"
        threshold: "high"
        delegate_to: "senior-dev"
      - type: "task_type"
        matches: ["research", "find", "analyze"]
        delegate_to: "researcher"
      - type: "task_type"
        matches: ["code", "write", "debug", "build", "script"]
        delegate_to: "senior-dev"
      - type: "task_type"
        matches: ["schedule", "remind", "cron"]
        delegate_to: "scheduler"
      - type: "task_type"
        matches: ["audit", "security", "harden"]
        delegate_to: "security"
  metadata:
    created: "2026-03-11"
    owner: "Aaron Maziarz"
    notes: "Main brain agent - all user requests flow through here"

