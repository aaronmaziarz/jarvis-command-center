# ==============================================================================
# ROUTING RULES
# ==============================================================================

routing_rules:
  # When brain should answer directly (not delegate)
  answer_directly:
    - "greeting"
    - "status check"
    - "simple question"
    - "help request"
    - "meta question about Jarvis"
  
  # When to delegate to domain leads
  delegate_to_lead:
    - criteria: "engineering_task"
      delegate_to: "senior-dev"
    - criteria: "research_task"
      delegate_to: "researcher"
    - criteria: "project_tracking"
      delegate_to: "project-manager"
  
  # When domain leads delegate to specialists
  delegate_to_specialist:
    senior-dev:
      - criteria: "frontend_task"
        delegate_to: "frontend-dev"
      - criteria: "backend_task"
        delegate_to: "backend"
      - criteria: "testing_task"
        delegate_to: "qa-test"
      - criteria: "scripting_task"
        delegate_to: "scripting-automation"
  
  # Failure handling
  failure_handling:
    max_retries: 2
    escalation: "brain"  # Return to brain on failure
    fallback: "answer_directly"  # Brain answers if specialist fails

